name: Release

# Triggers when you push a version tag like v1.0.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            args: ""
            artifact_name: "linux"

          # ── macOS — Apple Silicon ───────────────────────────────────────
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact_name: "macos-arm"

          # ── macOS — Intel ───────────────────────────────────────────────
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact_name: "macos-intel"

          # ── Windows ─────────────────────────────────────────────────────
          - platform: windows-latest
            args: ""
            artifact_name: "windows"

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # ── 3. Rust ─────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      # ── 4. Linux system dependencies ────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      # ── 5. Frontend dependencies ─────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      # ── 6. Build & publish release ───────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Optional: macOS code signing ──────────────────────────────
          # Uncomment and add these secrets in GitHub Settings → Secrets
          # to remove the "unverified developer" warning on macOS.
          #
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # ── Optional: Windows code signing ────────────────────────────
          # Uncomment and add these secrets to remove the SmartScreen warning
          # on Windows.
          #
          # TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "FocusKit __VERSION__"
          releaseBody: |
            ## What's new
            See the [README](https://github.com/${{ github.repository }}#readme) for full documentation.

            ## Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `FocusKit_*_aarch64.dmg` |
            | macOS (Intel) | `FocusKit_*_x64.dmg` |
            | Windows | `FocusKit_*_x64-setup.exe` or `.msi` |
            | Linux (Ubuntu/Debian) | `focuskit_*_amd64.deb` |
            | Linux (universal) | `focuskit_*_amd64.AppImage` |

            ## Install
            - **macOS**: Open the `.dmg` and drag FocusKit to Applications.
            - **Windows**: Run the `.exe` installer.
            - **Linux (Debian/Ubuntu)**: `sudo dpkg -i focuskit_*.deb`
            - **Linux (universal)**: `chmod +x focuskit_*.AppImage && ./focuskit_*.AppImage`
          releaseDraft: true  # creates draft so you can review before publishing
          prerelease: false
          args: ${{ matrix.args }}
